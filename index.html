<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dans Fabriek - Portfolio</title>
    <style>
        :root {
            --bg-color: #ffffff;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100dvh; /* Volledige dynamische hoogte van het scherm */
            background-color: var(--bg-color);
            overflow: hidden; /* Schakelt scrollbalken permanent uit */
        }

        /* space-evenly verdeelt alle witruimte perfect en evenredig over de hele pagina */
        body {
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
        }

        h1 {
            text-align: center;
            margin: 0; /* Marge op 0 gezet zodat de flexbox de ruimte perfect gelijk verdeelt */
            font-size: 2rem;
            line-height: 0.9;
            letter-spacing: 4px;
            text-transform: uppercase;
            /* Arial Black zorgt ervoor dat de letters ook op iPhones/iPads extreem dik en krachtig zijn */
            font-family: "Arial Black", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
            font-weight: 900;
            flex-shrink: 0;
        }

        h1 span { display: block; }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 85vw;
            /* DE GOUDEN FORMULE:
               - Maximaal 360px breed op desktop zodat hij mooi compact blijft.
               - Maximaal 32dvh op mobiel: dit dwingt de animatie om klein genoeg te worden
                 zodat de geluidsknop ALTIJD gegarandeerd onderin je scherm past! */
            max-width: min(360px, 32dvh);
            margin: 0;
        }

        .animation-block {
            width: 100%;
            aspect-ratio: 16 / 9; /* Houdt de Procreate-verhouding perfect intact */
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            position: relative;
            overflow: hidden;
            border: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            display: none;
            font-weight: 900;
            font-size: 11px;
            color: #fff;
            z-index: 9999;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 5px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* AANGEPAST: Verbergt de custom cursor permanent op telefoons en tablets */
        @media (pointer: coarse) {
            #custom-cursor {
                display: none !important;
            }
        }

        .footer {
            display: flex;
            justify-content: center;
            margin: 0; /* Marge op 0 gezet zodat de flexbox de ruimte perfect gelijk verdeelt */
            flex-shrink: 0;
        }

        .sound-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.6;
            user-select: none;
        }

            position: absolute;
