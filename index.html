<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dans Fabriek - Portfolio</title>
    <style>
        :root {
            --bg-color: #ffffff;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100dvh; /* dvh corrigeert de app-balken van o.a. WhatsApp en Safari op mobiel */
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden; /* Voorkomt dat je ooit kunt scrollen: alles blijft in beeld */
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            text-align: center;
            margin: 0;
            padding: 3dvh 0 1dvh 0; /* Schaalbare witruimte boven de titel */
            font-size: 1.9rem;
            line-height: 0.9; 
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900; /* Maximale dikte */
            -webkit-font-smoothing: antialiased; /* Maakt letters extra strak en dik op iOS */
            flex-shrink: 0;
        }

        h1 span { display: block; }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 85vw;
            max-width: 420px;
            margin: auto auto; /* Centreert de danser perfect in de overgebleven ruimte */
        }

        /* DE MOBIELE FIX VOOR DE HOOGTE: Zorgt dat de volumeknop áltijd past */
        @media (max-width: 768px), (max-height: 750px) {
            .main-container {
                width: 70vw; /* Iets meer witruimte aan de zijkanten op mobiel */
                max-width: min(300px, 33dvh); /* Schaalt de danser omlaag als het scherm kort is */
            }
        }

        .animation-block {
            width: 100%;
            aspect-ratio: 16 / 9; /* Blokken blijven perfect sluitend */
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none; 
            position: relative;
            overflow: hidden;
            border: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; 
        }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            display: none;
            font-weight: 900;
            font-size: 11px;
            color: #fff;
            z-index: 9999;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 5px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer {
            display: flex;
            justify-content: center;
            padding: 1dvh 0 3dvh 0; /* Witruimte rondom de knop */
            flex-shrink: 0;
        }

        .sound-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.6;
            user-select: none;
        }

        .copyright {
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }
    </style>
</head>
<body>

    <h1>Dans<span>Fabriek</span></h1>

    <div class="main-container">
        <div class="animation-block" id="block-1" data-state="1" onclick="changeAnimation(1)">
            <video autoplay loop muted playsinline id="vid-1">
                <source src="animatie1_fase1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="animation-block" id="block-2" data-state="1" onclick="changeAnimation(2)">
            <video autoplay loop muted playsinline id="vid-2">
                <source src="animatie2_fase1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="animation-block" id="block-3" data-state="1" onclick="changeAnimation(3)">
            <video autoplay loop muted playsinline id="vid-3">
                <source src="animatie3_fase1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="footer">
        <div id="sound-icon" class="sound-btn" onclick="toggleSound()">🔇</div>
    </div>

    <div class="copyright">&copy; madebyalma</div>
    <div id="custom-cursor">CLICK</div>

    <audio id="bg-audio" loop>
        <source src="SoundBoogie.mp3" type="audio/mpeg">
    </audio>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const blocks = document.querySelectorAll('.animation-block');
        const audio = document.getElementById('bg-audio');
        const soundIcon = document.getElementById('sound-icon');

        // Custom cursor
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        blocks.forEach(block => {
            block.addEventListener('mouseenter', () => { cursor.style.display = 'block'; });
            block.addEventListener('mouseleave', () => { cursor.style.display = 'none'; });
        });

        // Bestandsnamen per blok
        const animaties = {
            1: ["animatie1_fase1.mp4", "animatie1_fase2.mp4", "animatie1_fase3.mp4"],
            2: ["animatie2_fase1.mp4", "animatie2_fase2.mp4", "animatie2_fase3.mp4"],
            3: ["animatie3_fase1.mp4", "animatie3_fase2.mp4", "animatie3_fase3.mp4"]
        };

        function changeAnimation(blockNum) {
            const block = document.getElementById(`block-${blockNum}`);
            const video = document.getElementById(`vid-${blockNum}`);
            
            let state = parseInt(block.getAttribute('data-state'));
            state = (state % 3) + 1; 
            block.setAttribute('data-state', state);

            video.src = animaties[blockNum][state - 1];
            video.play();
        }

        function toggleSound() {
            if (audio.paused) { audio.play(); soundIcon.innerText = "🔊"; soundIcon.style.opacity = "1"; }
            else { audio.pause(); soundIcon.innerText = "🔇"; soundIcon.style.opacity = "0.6"; }
        }
    </script>
</body>
</html>
