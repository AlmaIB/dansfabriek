<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dans Fabriek - Portfolio</title>
    <style>
        :root {
            --side-padding: 30%; 
            --bg-color: #ffffff;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; 
            font-family: 'Helvetica', Arial, sans-serif;
            background-color: var(--bg-color);
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            text-align: center;
            margin: 0;
            padding: 20px 0;
            font-size: 1.8rem;
            line-height: 0.9; 
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
            flex-shrink: 0;
        }

        h1 span { display: block; }

        .main-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1; 
            width: 100%;
            padding: 0 var(--side-padding);
            margin: 0 auto;
            max-width: 1200px;
            justify-content: center;
        }

        .animation-block {
            width: 100%;
            flex: 1; 
            max-height: 150px; 
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none; 
            position: relative;
            overflow: hidden;
            border: none;
        }

        /* Zorgt dat de video het hele vak vult */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            pointer-events: none; /* Zorgt dat de klik door de video heen naar het vak gaat */
        }

        #custom-cursor {
            position: fixed;
            pointer-events: none;
            display: none;
            font-weight: 900;
            font-size: 11px;
            color: #fff;
            z-index: 9999;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 5px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .footer {
            display: flex;
            justify-content: center;
            padding: 20px 0;
            flex-shrink: 0;
        }

        .sound-btn {
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
            opacity: 0.6;
            user-select: none;
        }

        .copyright {
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #999;
        }

        @media (max-width: 768px) {
            :root { --side-padding: 10%; }
            html, body { overflow: auto; height: auto; }
            .animation-block { max-height: 200px; aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

    <h1>Dans<span>Fabriek</span></h1>

    <div class="main-container">
        <!-- Elk blok begint met de eerste MP4 van die reeks -->
        <div class="animation-block" id="block-1" data-state="1" onclick="changeAnimation(1)">
            <video autoplay loop muted playsinline id="vid-1">
                <source src="animatie1_fase1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="animation-block" id="block-2" data-state="1" onclick="changeAnimation(2)">
            <video autoplay loop muted playsinline id="vid-2">
                <source src="animatie2_fase1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="animation-block" id="block-3" data-state="1" onclick="changeAnimation(3)">
            <video autoplay loop muted playsinline id="vid-3">
                <source src="animatie3_fase1.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <div class="footer">
        <div id="sound-icon" class="sound-btn" onclick="toggleSound()">🔇</div>
    </div>

    <div class="copyright">&copy; madebyalma</div>
    <div id="custom-cursor">CLICK</div>

    <audio id="bg-audio" loop>
        <source src="SoundBoogie.mp3" type="audio/mpeg">
    </audio>

    <script>
        const cursor = document.getElementById('custom-cursor');
        const blocks = document.querySelectorAll('.animation-block');
        const audio = document.getElementById('bg-audio');
        const soundIcon = document.getElementById('sound-icon');

        // Custom cursor
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
        blocks.forEach(block => {
            block.addEventListener('mouseenter', () => { cursor.style.display = 'block'; });
            block.addEventListener('mouseleave', () => { cursor.style.display = 'none'; });
        });

        // HIER KOPPEL JE DE BESTANDSNAMEN
        const animaties = {
            1: ["animatie1_fase1.mp4", "animatie1_fase2.mp4", "animatie1_fase3.mp4"],
            2: ["animatie2_fase1.mp4", "animatie2_fase2.mp4", "animatie2_fase3.mp4"],
            3: ["animatie3_fase1.mp4", "animatie3_fase2.mp4", "animatie3_fase3.mp4"]
        };

        function changeAnimation(blockNum) {
            const block = document.getElementById(`block-${blockNum}`);
            const video = document.getElementById(`vid-${blockNum}`);
            
            let state = parseInt(block.getAttribute('data-state'));
            state = (state % 3) + 1; // Wissel tussen 1, 2, 3
            block.setAttribute('data-state', state);

            // Verander de video bron
            video.src = animaties[blockNum][state - 1];
            video.play();
        }

        function toggleSound() {
            if (audio.paused) { audio.play(); soundIcon.innerText = "🔊"; soundIcon.style.opacity = "1"; }
            else { audio.pause(); soundIcon.innerText = "🔇"; soundIcon.style.opacity = "0.6"; }
        }
    </script>
</body>
</html>
